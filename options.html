<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quick Translator Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    select {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 15px;
      color: green;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Quick Translator 設定</h1>
  
  <div class="form-group">
    <label for="sourceLang">來源語言 (Source Language)</label>
    <select id="sourceLang">
      <option value="auto">自動偵測 (Auto-detect)</option>
      <option value="en">英文 (English)</option>
      <option value="zh-TW">繁體中文 (Traditional Chinese)</option>
      <option value="zh-CN">簡體中文 (Simplified Chinese)</option>
      <option value="ja">日文 (Japanese)</option>
      <option value="ko">韓文 (Korean)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="targetLang">目標語言 (Target Language)</label>
    <select id="targetLang">
      <option value="zh-TW">繁體中文 (Traditional Chinese)</option>
      <option value="en">英文 (English)</option>
      <option value="zh-CN">簡體中文 (Simplified Chinese)</option>
      <option value="ja">日文 (Japanese)</option>
      <option value="ko">韓文 (Korean)</option>
    </select>
  </div>

  <button id="saveBtn">儲存設定</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
